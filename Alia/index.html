<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for Social Media Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Background container for glowing dots -->
    <div class="background-dots"></div>
    
    <div class="options">
        <button class="mab" id="copy"> <i class="fas fa-copy"></i> </button>
        <button class="mab" id="un-mute"> <i class="fas fa-volume-mute"></i> </button>
    </div>
    <div class="profile-container">
        <!-- Profile Image Container -->
        <div class="profile-image">
            <!-- Replace 'YOUR_PHOTO_URL.jpg' with your actual image path -->
            <img src="pro.png" alt="Profile Picture" id="myPhoto">
        </div>
        
        <!-- Name Label -->
        <h1 class="profile-name">Alia | عالیە</h1>
        
        <!-- Rotating Quotes Container -->
        <div class="quote-container">
            <p id="quote-text" class="fade-text"></p>
        </div>
        
        <!-- Social Media Links -->
        <div class="social-links">
            <a href="YOUR_PDB_LINK" class="social-icon" target="_blank" style="font-weight: bold; font-size: 1.2rem;">PDB</a>
            <a href="YOUR_TIKTOK_LINK" class="social-icon" target="_blank"><i class="fab fa-tiktok"></i></a>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
